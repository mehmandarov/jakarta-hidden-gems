# MicroProfile JWT — portable authentication for ConfSpeakerHub.
# Verification key (public) + the issuer we accept.
mp.jwt.verify.publickey.location=/publicKey.pem
mp.jwt.verify.issuer=https://confspeakerhub.example

# Signing key (private) used ONLY by the dev token endpoint to mint demo tokens.
smallrye.jwt.sign.key.location=/privateKey.pem

