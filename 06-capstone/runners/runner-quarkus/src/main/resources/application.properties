# Quarkus runner configuration for ConfSpeakerHub.
quarkus.http.port=9080
quarkus.http.host=0.0.0.0

# Build a single runnable uber-jar (java -jar target/runner-quarkus-runner.jar).
quarkus.package.jar.type=uber-jar

# Arc only indexes dependencies that carry a beans.xml or are listed here.
# The capstone library + every gem module hold CDI beans / JAX-RS resources /
# interceptors, so index them all for discovery.
quarkus.index-dependency.capstone.group-id=com.mehmandarov.jhg
quarkus.index-dependency.capstone.artifact-id=capstone
quarkus.index-dependency.domain.group-id=com.mehmandarov.jhg
quarkus.index-dependency.domain.artifact-id=domain
quarkus.index-dependency.interceptors.group-id=com.mehmandarov.jhg
quarkus.index-dependency.interceptors.artifact-id=interceptors-observability
quarkus.index-dependency.authorization.group-id=com.mehmandarov.jhg
quarkus.index-dependency.authorization.artifact-id=authorization
quarkus.index-dependency.elpolicy.group-id=com.mehmandarov.jhg
quarkus.index-dependency.elpolicy.artifact-id=el-policy
quarkus.index-dependency.sse.group-id=com.mehmandarov.jhg
quarkus.index-dependency.sse.artifact-id=rest-sse-async
quarkus.index-dependency.llm.group-id=com.mehmandarov.jhg
quarkus.index-dependency.llm.artifact-id=jsonp-llm-streaming

# MicroProfile JWT — same keys/issuer the capstone declares in its
# META-INF/microprofile-config.properties.
mp.jwt.verify.publickey.location=/publicKey.pem
mp.jwt.verify.issuer=https://confspeakerhub.example
smallrye.jwt.sign.key.location=/privateKey.pem

# Gems #2 and #3 layer in their richer implementations with a globally-enabled
# CDI @Alternative + @Priority (PolicyEventVisibility over EventVisibility;
# ElPredicateEngine over PredicateEngine). That is the portable, CDI-Lite idiom
# Quarkus Arc supports natively — no @Specializes, so no exclude-types veto is
# needed here, and the same gem source runs unchanged on Liberty and Helidon.
