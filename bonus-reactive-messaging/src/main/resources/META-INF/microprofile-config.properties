# MicroProfile Reactive Messaging — Kafka connector wiring for ConfSpeakerHub.
# Portable across Open Liberty (mpReactiveMessaging), Helidon, Quarkus, Payara.

# Broker — overridable via env (matches docker-compose KAFKA_BOOTSTRAP_SERVERS).
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:redpanda:9092}

# Outgoing: POST /api/ingest -> confs.events.incoming
mp.messaging.outgoing.confs-events-out.connector=smallrye-kafka
mp.messaging.outgoing.confs-events-out.topic=confs.events.incoming
mp.messaging.outgoing.confs-events-out.value.serializer=org.apache.kafka.common.serialization.StringSerializer

# Incoming: confs.events.incoming -> EventConsumer
mp.messaging.incoming.confs-events-in.connector=smallrye-kafka
mp.messaging.incoming.confs-events-in.topic=confs.events.incoming
mp.messaging.incoming.confs-events-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.confs-events-in.auto.offset.reset=earliest
mp.messaging.incoming.confs-events-in.group.id=confspeakerhub

